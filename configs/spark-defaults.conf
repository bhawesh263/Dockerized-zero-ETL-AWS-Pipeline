# Spark default configurations
# Automatically download and include Kafka, Iceberg, and AWS S3 bundle packages
spark.jars.packages              org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.iceberg:iceberg-aws-bundle:1.5.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1

# Enable Iceberg SQL extensions and catalog by default
spark.sql.extensions             org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.mycatalog      org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.mycatalog.type hadoop
spark.sql.default.catalog        mycatalog

# Configure partitions and properties for local execution
spark.sql.shuffle.partitions     4
